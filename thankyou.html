<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | DPP Fitness</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      .thankyou {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .thankyou__inner {
        max-width: 480px;
      }

      .thankyou__icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.1);
        border: 1px solid rgba(201, 168, 76, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
      }

      .thankyou__icon svg {
        width: 28px;
        height: 28px;
        color: var(--gold);
      }

      .thankyou__heading {
        font-family: var(--font-heading);
        font-size: clamp(2.2rem, 6vw, 3rem);
        font-weight: 600;
        color: var(--text);
        margin-bottom: 1rem;
        line-height: 1.1;
      }

      .thankyou__sub {
        font-size: 0.95rem;
        font-weight: 300;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }
    </style>
  </head>
  <body>
    <main class="thankyou">
      <div class="thankyou__inner">
        <div class="thankyou__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <p class="section__eyebrow">Message Received</p>
        <h1 class="thankyou__heading">Thank You.</h1>
        <div class="gold-rule gold-rule--center"></div>
        <p class="thankyou__sub">Daniel will be in touch within 24 hours to build a programme around you.</p>
        <a href="index.html" class="btn btn--gold">Back to Home</a>
      </div>
    </main>
  </body>
</html>
